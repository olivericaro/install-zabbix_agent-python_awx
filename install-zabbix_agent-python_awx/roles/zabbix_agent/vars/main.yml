---
# =============================================================
# ZABBIX AGENT - VARIÁVEIS FIXAS DA INFRAESTRUTURA
# roles/zabbix_agent/vars/main.yml
# =============================================================

# --- Pacote e Serviço ---
zabbix_agent_package_name: zabbix-agent
zabbix_agent_service_name: zabbix-agent
zabbix_agent_conf_path: /etc/zabbix/zabbix_agentd.conf

# --- Configuração do Agent ---
zabbix_agent_logfile: /var/log/zabbix/zabbix_agentd.log
zabbix_agent_logfilesize: 10
zabbix_agent_debuglevel: 3
zabbix_agent_enable_remote_commands: 0
zabbix_agent_log_remote_commands: 1

# --- Servidores Zabbix ---
zabbix_server_dns: "zabbix.your.domain"
zabbix_server_primary: "zabbix.your.domain"

# --- API do Zabbix ---
zabbix_api_url: "http://{{ zabbix_server_host }}/zabbix/api_jsonrpc.php"

# --- Repositórios Zabbix 6.0 LTS ---

# RedHat / Oracle Linux
zabbix_repo_rhel9: "https://repo.zabbix.com/zabbix/6.0/rhel/9/x86_64/zabbix-release-latest-6.0.el9.noarch.rpm"
zabbix_repo_rhel8: "https://repo.zabbix.com/zabbix/6.0/rhel/8/x86_64/zabbix-release-latest-6.0.el8.noarch.rpm"
zabbix_repo_rhel7: "https://repo.zabbix.com/zabbix/6.0/rhel/7/x86_64/zabbix-release-latest-6.0.el7.noarch.rpm"

# Ubuntu
zabbix_repo_ubuntu2404: "https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_6.0+ubuntu24.04_all.deb"
zabbix_repo_ubuntu2204: "https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_6.0+ubuntu22.04_all.deb"
zabbix_repo_ubuntu2004: "https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_6.0+ubuntu20.04_all.deb"

# Amazon Linux
zabbix_repo_amazon2023: "https://repo.zabbix.com/zabbix/6.0/amazonlinux/2023/noarch/zabbix-release-latest-6.0.amzn2023.noarch.rpm"